<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantedge // Admin Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ffbb;
            --bg-black: #050505;
            --neon-red: #ef4444;
            --neon-blue: #3b82f6;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 187, 0.15);
            transform: translateY(-5px);
        }

        .neon-text { text-shadow: 0 0 10px rgba(0, 255, 187, 0.5); }

        /* --- Status & Role Pills --- */
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-active { background: rgba(0, 255, 187, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .status-deactivated { background: rgba(239, 68, 68, 0.1); color: var(--neon-red); border: 1px solid var(--neon-red); }
        
        .role-admin { border: 1px solid var(--neon-blue); color: var(--neon-blue); background: rgba(59, 130, 246, 0.1); }
        .role-user { border: 1px solid #555; color: #888; }

        /* --- Modals --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 420px;
            padding: 40px;
            background: #0a0a0a;
            border: 1px solid var(--neon-green);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 187, 0.1);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- Skeleton Loading --- */
        .skeleton-bar {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(0,255,187,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite linear;
            border-radius: 4px;
        }
        .sk-text { height: 15px; width: 60%; margin-bottom: 10px; }
        .sk-text-sm { height: 10px; width: 30%; }
        .sk-pill { height: 20px; width: 80px; border-radius: 20px; }
        @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- Toasts --- */
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: rgba(10, 10, 10, 0.95);
            border-left: 4px solid var(--neon-red);
            padding: 16px 24px;
            border-radius: 12px;
            width: 320px;
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes toastIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        .loaded-row { animation: rowReveal 0.5s ease-out forwards; opacity: 0; }
        @keyframes rowReveal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logout-btn {
            padding: 8px 16px;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .logout-btn:hover { background: var(--neon-red); color: black; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        .exit-sequence { animation: exitFlash 0.5s forwards; }
        @keyframes exitFlash { 50% { filter: brightness(4) blur(10px); } 100% { filter: brightness(0); opacity: 0; } }
    </style>
</head>

<body class="min-h-screen p-6 md:p-12 bg-[#050505]">
    <div id="notification-container"></div>

    <div id="security-modal" class="modal-overlay">
        <div class="modal-content !border-red-500 !shadow-[0_0_50px_rgba(239,68,68,0.2)]">
            <div class="mb-2 text-[10px] tracking-[0.5em] text-red-500 font-black uppercase">Level 5 Clearance Challenge</div>
            <h2 class="text-white text-xl font-bold mb-4">Confirm Authorization</h2>
            <p id="security-desc" class="text-gray-400 text-sm mb-6"></p>
            
            <input type="password" id="admin-verify-password" 
                   class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-6 text-white focus:border-red-500 outline-none transition-all placeholder:text-gray-700"
                   placeholder="ENTER_MASTER_PASSWORD">
            
            <div class="flex gap-4">
                <button onclick="closeModal('security-modal')" class="flex-1 px-4 py-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase">Abort</button>
                <button id="security-confirm-btn" class="flex-1 px-4 py-3 rounded-xl bg-red-600 text-white hover:bg-red-500 transition-all text-[10px] font-bold uppercase shadow-lg shadow-red-900/20">Authorize</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="mb-2 text-[10px] tracking-[0.5em] text-gray-500 font-bold uppercase">System Override</div>
            <h2 class="modal-glitch-text text-xl font-bold mb-4">Toggle Operative?</h2>
            <p id="modal-desc" class="text-gray-400 text-sm mb-8"></p>
            <div class="flex gap-4">
                <button onclick="closeModal('confirm-modal')" class="flex-1 px-4 py-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase">Cancel</button>
                <button id="modal-confirm-btn" class="flex-1 px-4 py-3 rounded-xl bg-[#00ffbb] text-black hover:shadow-[0_0_20px_#00ffbb] transition-all text-[10px] font-bold uppercase">Execute</button>
            </div>
        </div>
    </div>

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-16">
        <div class="flex items-center gap-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase">Vant<span class="text-[#00ffbb] neon-text">edge.</span></h1>
                <p class="text-[10px] text-gray-500 font-bold tracking-[0.3em]">ADMIN_INTEL_CORE // V2.0</p>
            </div>
            <button onclick="terminateSession()" class="logout-btn uppercase">Terminate_Session [ESC]</button>
        </div>
        <div class="text-right">
            <span id="user-count" class="text-4xl font-bold text-white">0</span>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Total Operatives</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="glass-card rounded-[2rem] overflow-hidden border-white/5">
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                <h2 class="text-lg font-bold tracking-tight">Operative Management</h2>
                <button onclick="loadUsers()" class="text-[10px] font-bold bg-white/5 hover:bg-[#00ffbb] hover:text-black px-6 py-2.5 rounded-full transition-all border border-white/10">REFRESH_SYNC</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 text-[10px] uppercase tracking-[0.2em] border-b border-white/5 font-bold">
                            <th class="p-8">Operative / Intel</th>
                            <th class="p-8 text-center">Clearance</th>
                            <th class="p-8 text-center">Status</th>
                            <th class="p-8 text-right">Strategic_Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let currentUserId = null;
        let pendingRoleChange = { id: null, next: null };

        function showToast(title, msg, isError = true) {
            const container = document.getElementById('notification-container');
            const t = document.createElement('div');
            t.className = `toast ${!isError ? '!border-green-400' : ''}`;
            t.innerHTML = `<div class="toast-header" style="color:${isError ? 'var(--neon-red)' : 'var(--neon-green)'}">${title}</div><div class="toast-body">${msg}</div>`;
            container.appendChild(t);
            setTimeout(() => { t.style.transform = 'translateX(120%)'; setTimeout(() => t.remove(), 400); }, 4000);
        }

        async function terminateSession() {
            document.body.classList.add('exit-sequence');
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_id');
            setTimeout(() => { window.location.href = '/'; }, 500);
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') terminateSession(); });

        async function loadUsers() {
            const tbody = document.getElementById('user-table-body');
            const token = localStorage.getItem('admin_token');
            const myId = localStorage.getItem('admin_id');
            if (!token) { window.location.href = '/'; return; }

            // --- FUTURISTIC SKELETON LOAD ---
            const skeletonHTML = `
                <tr class="skeleton-row border-b border-white/5">
                    <td class="p-8">
                        <div class="skeleton-bar sk-text"></div>
                        <div class="skeleton-bar sk-text-sm"></div>
                    </td>
                    <td class="p-8"><div class="skeleton-bar sk-pill mx-auto"></div></td>
                    <td class="p-8"><div class="skeleton-bar sk-pill mx-auto"></div></td>
                    <td class="p-8"><div class="skeleton-bar sk-pill ml-auto" style="width:100px"></div></td>
                </tr>
            `;
            tbody.innerHTML = skeletonHTML.repeat(4);

            try {
                const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 401 || res.status === 403) { terminateSession(); return; }
                const users = await res.json();
                document.getElementById('user-count').innerText = users.length;
                tbody.innerHTML = '';

                users.forEach((u, i) => {
                    const row = document.createElement('tr');
                    const isMe = u.id == myId;
                    row.className = "border-b border-white/5 hover:bg-white/[0.02] transition-colors loaded-row";
                    row.style.animationDelay = `${i * 0.05}s`;

                    const roleDisplay = u.role === 'Admin' 
                        ? `<span class="status-pill role-admin">ADMIN_LVL_5</span>` 
                        : `<span class="status-pill role-user">OPERATIVE_LVL_1</span>`;

                    // MASTER ROOT PROTECTION: Cannot demote self
                    const roleAction = isMe ? `<span class="text-[9px] text-[#00ffbb] font-black tracking-widest opacity-60">MASTER_ROOT_PROTECTED</span>` : 
                        `<button onclick="requestRoleChange(${u.id}, '${u.username}', '${u.role}')" class="text-[9px] font-black uppercase hover:underline ${u.role === 'Admin' ? 'text-red-400' : 'text-blue-400'}">${u.role === 'Admin' ? 'Demote_User' : 'Promote_Admin'}</button>`;

                    // SESSION PROTECTION: Cannot deactivate self
                    const statusAction = isMe ? `<span class="text-[9px] text-gray-600 font-bold tracking-widest">SESSION_LOCKED</span>` :
                        `<button onclick="confirmToggle(${u.id}, '${u.username}', '${u.status}')" class="px-5 py-2 rounded-lg text-[9px] font-black border transition-all ${u.status === 'ACTIVE' ? 'border-red-500/30 text-red-500 hover:bg-red-500 hover:text-black' : 'border-[#00ffbb]/30 text-[#00ffbb] hover:bg-[#00ffbb] hover:text-black'}">${u.status === 'ACTIVE' ? 'DEACTIVATE' : 'ACTIVATE'}</button>`;

                    row.innerHTML = `
                        <td class="p-8">
                            <div class="flex flex-col">
                                <span class="font-bold text-lg ${isMe ? 'text-[#00ffbb]' : 'text-white'}">${u.username} ${isMe ? '<span class="text-[10px] ml-2 text-gray-500">[YOU]</span>' : ''}</span>
                                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">${u.email}</span>
                            </div>
                        </td>
                        <td class="p-8 text-center"><div class="flex flex-col items-center gap-2">${roleDisplay}${roleAction}</div></td>
                        <td class="p-8 text-center"><span class="status-pill ${u.status === 'ACTIVE' ? 'status-active' : 'status-deactivated'}">${u.status}</span></td>
                        <td class="p-8 text-right">${statusAction}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) { showToast("UPLINK_FAILURE", "Mainframe is currently unreachable."); }
        }

        function confirmToggle(id, name, status) {
            currentUserId = id;
            document.getElementById('modal-desc').innerHTML = `Target: <span class="text-white font-bold">${name}</span><br>Action: ${status === 'ACTIVE' ? 'Procedural Lockout' : 'Clearance Restoration'}`;
            document.getElementById('confirm-modal').style.display = 'flex';
            document.getElementById('modal-confirm-btn').onclick = executeToggle;
        }

        function requestRoleChange(id, name, currentRole) {
            pendingRoleChange = { id, next: currentRole === 'Admin' ? 'User' : 'Admin' };
            document.getElementById('security-desc').innerHTML = `Initiating clearance shift for <span class='text-white font-bold'>${name}</span> to <span class='text-white font-bold'>${pendingRoleChange.next}</span> level.`;
            document.getElementById('admin-verify-password').value = '';
            document.getElementById('security-modal').style.display = 'flex';
            document.getElementById('security-confirm-btn').onclick = executeRoleChange;
        }

        function closeModal(m) { document.getElementById(m).style.display = 'none'; }

        async function executeToggle() {
            const token = localStorage.getItem('admin_token');
            closeModal('confirm-modal');
            try {
                const res = await fetch(`/api/admin/toggle-status/${currentUserId}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) { loadUsers(); showToast("SUCCESS", "Status updated successfully.", false); }
                else { const d = await res.json(); showToast("OVERRIDE_REFUSED", d.detail); }
            } catch (err) { showToast("ERROR", "Uplink interrupted."); }
        }

        async function executeRoleChange() {
            const pass = document.getElementById('admin-verify-password').value;
            const token = localStorage.getItem('admin_token');
            if (!pass) return showToast("ERROR", "Credential input required.");
            closeModal('security-modal');

            try {
                const res = await fetch(`/api/admin/change-role/${pendingRoleChange.id}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass, new_role: pendingRoleChange.next })
                });
                const d = await res.json();
                if (res.ok) { loadUsers(); showToast("SUCCESS", d.message, false); }
                else { showToast("AUTH_FAILURE", d.detail); }
            } catch (err) { showToast("ERROR", "Security protocol breach."); }
        }

        loadUsers();
    </script>
</body>
</html>
