<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VANTEDGE // NODE_STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        body { background: #000; color: #00ffbb; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        
        .node-card {
            background: rgba(0, 255, 187, 0.02);
            border: 1px solid rgba(0, 255, 187, 0.1);
            backdrop-filter: blur(10px);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-fill { transition: width 1s cubic-bezier(0.1, 0.7, 1.0, 0.1); }
        
        /* CRT Scanline Effect */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .glow { text-shadow: 0 0 15px rgba(0, 255, 187, 0.6); }

        .btn-terminal {
            position: relative;
            padding: 0.5rem 1.5rem;
            background: transparent;
            color: #00ffbb;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border: 1px solid rgba(0, 255, 187, 0.3);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-terminal::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 187, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-terminal:hover::before {
            left: 100%;
        }

        .btn-terminal:hover {
            background: rgba(0, 255, 187, 0.1);
            border-color: #00ffbb;
            box-shadow: 0 0 15px rgba(0, 255, 187, 0.4);
            transform: translateY(-2px);
        }

        /* Anomaly Glitch Effect */
        .anomaly-alert {
            animation: glitch-red 0.2s infinite;
            border-color: #ff0055 !important;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2) !important;
        }

        @keyframes glitch-red {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }

        .prediction-tag { font-size: 8px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto relative z-10">
        <header class="flex justify-between items-center mb-12 border-b border-emerald-500/20 pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter uppercase italic glow">Node_Diagnostics_v2</h1>
                <p class="text-[10px] mt-2 opacity-50 tracking-[0.5em]">
                    UPLINK: <span id="status" class="text-emerald-400 text-xs">HANDSHAKE_INITIATED</span> | 
                    STABILITY: <span id="stability" class="text-emerald-400 text-xs">100%</span>
                </p>
            </div>
            
            <div class="flex items-center gap-6">
                <div id="clock" class="hidden md:block text-2xl font-bold opacity-80 tabular-nums">00:00:00</div>
                
                <a href="/admin" class="btn-terminal rounded-sm">
                    <span>Return_to_HQ</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </a>
            </div>
        </header>

        <div id="node-matrix" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        const token = localStorage.getItem("access_token") || "dev_mode";
        const grid = document.getElementById("node-matrix");
        
        // Start EventSource 
        const es = new EventSource(`/api/system/node-stream?token=${token}`);

        es.onopen = () => {
            document.getElementById("status").innerText = "UPLINK_LIVE_STABLE";
        };

        es.onmessage = (e) => {
            const data = JSON.parse(e.data);
            document.getElementById("clock").innerText = data.timestamp;
            document.getElementById("stability").innerText = data.stability_index;
            
            grid.innerHTML = "";
            data.nodes.forEach(node => {
                const isAnomaly = node.anomaly;
                const isCrit = node.status === "CRITICAL" || node.status === "ANOMALY";
                
                // Set tag colors based on AI prediction
                let tagClass = "bg-emerald-500/10 text-emerald-400";
                if(node.prediction === "STRESS_WARNING") tagClass = "bg-orange-500/10 text-orange-400";
                if(isAnomaly) tagClass = "bg-red-500/20 text-red-500 animate-pulse";

                grid.innerHTML += `
                    <div class="node-card p-8 rounded-[2rem] border-l-4 ${isAnomaly ? 'anomaly-alert' : (isCrit ? 'border-red-500' : 'border-emerald-500')}">
                        <div class="flex justify-between items-start mb-8">
                            <i data-lucide="${node.icon}" class="${isCrit ? 'text-red-500' : 'text-emerald-400'}"></i>
                            <div class="flex flex-col items-end gap-2">
                                <span class="prediction-tag ${tagClass}">${node.prediction}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold uppercase tracking-widest ${isCrit ? 'text-red-500' : 'text-emerald-400'}">
                                        ${node.status}
                                    </span>
                                    <div class="w-2 h-2 rounded-full ${isCrit ? 'bg-red-500 animate-ping' : 'bg-emerald-500 animate-pulse'}"></div>
                                </div>
                            </div>
                        </div>
                        
                        <h2 class="text-white text-xl font-bold mb-1">${node.label}</h2>
                        <p class="text-[9px] opacity-30 font-mono mb-6">${node.id} | TREND: ${node.trend}</p>

                        <div class="flex justify-between items-end mb-2">
                            <span class="text-[10px] opacity-40 uppercase tracking-widest">Network_Ping</span>
                            <span class="text-lg font-bold tabular-nums">${node.latency}</span>
                        </div>
                        
                        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                            <div class="bar-fill h-full ${isCrit ? 'bg-red-500 shadow-[0_0_10px_#ff0055]' : 'bg-emerald-500 shadow-[0_0_10px_#00ffbb]'}" 
                                 style="width: ${node.load}"></div>
                        </div>
                        
                        ${isAnomaly ? `<p class="text-[8px] text-red-500 font-bold uppercase mt-3">! Unidentified spike detected</p>` : ''}
                    </div>
                `;
            });
            lucide.createIcons();
        };

        es.onerror = () => {
            document.getElementById("status").innerText = "UPLINK_OFFLINE_RETRYING";
            document.getElementById("status").classList.add("text-red-500");
        };
    </script>
</body>
</html>
